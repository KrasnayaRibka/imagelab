<!DOCTYPE html>
<html>
  <head>
    <title>Test Form</title>
    <meta charset="utf-8" />
    <link
      href="https://releases.transloadit.com/uppy/v3.0.0/uppy.min.css"
      rel="stylesheet"
    />
    <link href="imagelab/static/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="form-container">
      <label for="userID-input">User ID:</label>
      <input
        type="number"
        id="userID-input"
        name="userID"
        placeholder="Enter User ID"
        required
      />
    </div>
    <div id="uppy-dashboard"></div>

    <hr style="margin: 30px 0; border: 1px solid #ddd" />

    <div class="form-container">
      <h3>Обычная HTML форма (для сравнения)</h3>
      <form
        id="standard-form"
        action="imagelab/upload"
        method="post"
        enctype="multipart/form-data"
      >
        <div style="margin-bottom: 15px">
          <label for="standard-file-input">Файл:</label>
          <input
            type="file"
            id="standard-file-input"
            name="file"
            accept=".jpg,.jpeg,.png,.gif,.tif,.psd,.zip,.heic,.dng"
            required
          />
        </div>
        <div style="margin-bottom: 15px">
          <label for="standard-userID-input">User ID:</label>
          <input
            type="number"
            id="standard-userID-input"
            name="userID"
            placeholder="Enter User ID"
            required
          />
        </div>
        <button
          type="submit"
          style="
            padding: 10px 20px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          Загрузить файл
        </button>
      </form>
    </div>

    <script>
      window.TEST_FORM_SEKRET = {{TEST_FORM_SEKRET_JSON}};
    </script>
    <script src="/imagelab/static/uppy-bundle.js"></script>
    <script src="/imagelab/static/uppy-init.js"></script>
    <script>
      // DropTarget plugin handles drag and drop automatically, no need for manual handlers
      console.log("🔧 Скрипт инициализации выполняется");
      console.log(
        "🔧 createUppyInstance доступна:",
        typeof createUppyInstance !== "undefined"
      );
      console.log(
        "🔧 UppyManager доступен:",
        typeof UppyManager !== "undefined"
      );

      // Initialize Uppy using UppyManager
      if (typeof UppyManager !== "undefined") {
        console.log("🚀 Инициализация UppyManager...");
        const uppyInstance = UppyManager.init();
        if (uppyInstance) {
          console.log("✅ UppyManager успешно инициализирован");
        } else {
          console.error("❌ ОШИБКА: UppyManager не смог инициализироваться");
        }
      } else {
        console.error("❌ ОШИБКА: UppyManager не найден!");
      }

      // Handle standard form submission
      document
        .getElementById("standard-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const formData = new FormData(this);
          const fileInput = document.getElementById("standard-file-input");
          const userIDInput = document.getElementById("standard-userID-input");

          console.log("📤 Отправка обычной формы:", {
            fileName: fileInput.files[0]?.name,
            fileSize: fileInput.files[0]?.size,
            userID: userIDInput.value,
          });

          fetch("/imagelab/upload", {
            method: "POST",
            body: formData,
          })
            .then((response) => {
              console.log("📥 Ответ от сервера (обычная форма):", {
                status: response.status,
                statusText: response.statusText,
              });
              return response.json();
            })
            .then((data) => {
              console.log("📥 Данные ответа (обычная форма):", data);
              alert("Файл успешно загружен!");
            })
            .catch((error) => {
              console.error("❌ Ошибка загрузки (обычная форма):", error);
              alert("Ошибка загрузки файла: " + error.message);
            });
        });
    </script>
  </body>
</html>
